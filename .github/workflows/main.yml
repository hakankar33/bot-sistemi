name: Zeus TV M3U8 Botu

on:
  schedule:
    # Her 10 dakikada bir çalıştırır
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Bu satır sayesinde GitHub Actions sekmesinden manuel olarak da başlatabilirsin

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Botun repoya dosya yükleyebilmesi için yazma izni

    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamını Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Botu Çalıştır
        run: python zeus_bot.py

      - name: Değişiklikleri GitHub'a Yükle
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Yeni veya değişen dosyaları ekle
          git add teyzeniyerim/
          git add ventino.m3u
          
          # Eğer dosyalarda bir değişiklik varsa commit ve push yap
          git diff-index --quiet HEAD || git commit -m "🤖 Otomatik Güncelleme: Kanallar Yenilendi"
          git push
          
