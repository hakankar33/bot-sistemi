name: Zeus TV M3U8 Botu

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu Klonla
        uses: actions/checkout@v4

      - name: Python Ortamini Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kutuphaneleri Yukle
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Botu Calistir
        run: python zeus_bot.py

      - name: Degisiklikleri GitHub'a Yukle
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add teyzeniyerim/
          git add ventino.m3u
          git diff-index --quiet HEAD || git commit -m "🤖 Otomatik Guncelleme: Kanallar Yenilendi"
          git push
